name: CI

on:
  push:
    branches: [main, master, 'fix/*', 'feat/*', 'chore/*', 'fix/**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run formatter check
        run: npm run format:check

      - name: Run linter
        run: npm run lint:check

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  coverage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (coverage job)
        # Run tests again in the coverage job to provide an isolated test run for artifact uploads
        run: npm test -- --run

      - name: (optional) Skip coverage until compatible provider is installed
        run: echo "Coverage step skipped: vitest coverage provider not configured for this repo"
